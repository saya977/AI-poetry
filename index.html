<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Муза — генератор стихов</title>
<style>
body { font-family: Arial, sans-serif; text-align: center; background: #fff3e0; margin:0; padding:20px;}
input, textarea { width: 80%; margin: 10px 0; padding: 10px; border-radius:8px; border:1px solid #ffa500;}
button { padding: 10px 20px; margin: 5px; border:none; border-radius:8px; background:#ff6b1a; color:white; cursor:pointer;}
button:hover { background:#e65100;}
textarea { height: 200px; resize: vertical; }
#loading { display:none; font-weight:bold; color:#e65100; margin:10px;}
</style>
</head>
<body>

<h1>Муза — генератор стихов</h1>

<input id="topic" placeholder="Тема стиха (например: осенний лес)" />
<br>
<button onclick="generate()">✨ Написать стих</button>
<button onclick="continuePoem()">✍️ Продолжить стих</button>

<div id="loading">ИИ думает...</div>

<br>
<textarea id="output" placeholder="Здесь появится стих..."></textarea>

<script>
// ВСТАВЬ СВОЙ OPENAI API КЛЮЧ ЗДЕСЬ
const OPENAI_API_KEY = "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";

async function askAI(prompt) {
    const loader = document.getElementById('loading');
    loader.style.display = 'block';
    try {
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + OPENAI_API_KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [{ role: "user", content: prompt }]
            })
        });

        const data = await res.json();
        return data.choices[0].message.content;

    } catch (e) {
        alert("Ошибка при подключении к OpenAI");
        console.error(e);
    } finally {
        loader.style.display = 'none';
    }
}

async function generate() {
    const topic = document.getElementById("topic").value.trim();
    if(!topic) return alert("Введите тему стиха!");
    const text = await askAI("Напиши красивое стихотворение на тему: " + topic);
    document.getElementById("output").value = text;
}

async function continuePoem() {
    const current = document.getElementById("output").value.trim();
    if(!current) return alert("Сначала напишите хотя бы одну строчку!");
    const text = await askAI("Продолжи это стихотворение, сохрани стиль и рифму:\n" + current);
    document.getElementById("output").value += "\n\n" + text;
}
</script>

</body>
</html>

</body>
</html>
