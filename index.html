<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Муза — ИИ-помощник поэта</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #00b894;
            --bg: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.9);
            --text: #2d3436;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f0f2f5 0%, #e0e5ec 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 30px 20px;
        }

        header h1 {
            margin: 0;
            color: var(--primary);
            font-size: 2.5rem;
            letter-spacing: -1px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 25px;
            width: 95%;
            max-width: 1200px;
            padding-bottom: 50px;
        }

        /* Редактор */
        .editor-box {
            background: var(--glass);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        textarea {
            width: 100%;
            height: 450px;
            border: 2px solid #ddd;
            border-radius: 15px;
            padding: 20px;
            font-size: 1.25rem;
            font-family: 'Georgia', serif;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.2);
        }

        /* Кнопки управления */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: #5b4cc4;
            transform: translateY(-2px);
        }

        button:active { transform: translateY(0); }

        .btn-green { background: var(--accent); }
        .btn-voice { background: #fdcb6e; color: #2d3436; }

        /* Боковая панель ИИ */
        .ai-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--glass);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border-top: 4px solid var(--primary);
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #636e72;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: #eee;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag:hover {
            background: var(--secondary);
            color: white;
        }

        #loading {
            display: none;
            color: var(--primary);
            font-weight: bold;
            margin-top: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Адаптивность */
        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
            header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Муза</h1>
    <p>Инклюзивный ИИ-помощник для студентов и поэтов</p>
</header>

<main class="container">
    <section class="editor-box">
        <textarea id="mainText" placeholder="Напишите строку, например: 'Вечерний сад в лучах заката...'"></textarea>
        
        <div id="loading">Муза размышляет...</div>

        <div class="toolbar">
            <button onclick="processAI('rhyme')">✨ Подобрать рифму</button>
            <button class="btn-green" onclick="processAI('style')">🎨 Улучшить стиль</button>
            <button class="btn-voice" onclick="speakText()">🔊 Озвучить</button>
            <button style="background:#dfe6e9; color:#2d3436" onclick="clearText()">Очистить</button>
        </div>
    </section>

    <aside class="ai-panel">
        <div class="card">
            <h3>Варианты рифм</h3>
            <div id="rhymeResult" class="tag-list">
                <span class="tag">Тут появятся идеи...</span>
            </div>
        </div>

        <div class="card">
            <h3>Анализ ритма</h3>
            <div id="rhythmInfo" style="font-size: 1.1rem; line-height: 1.4;">
                Введите текст для анализа...
            </div>
        </div>

        <div class="card">
            <h3>Инклюзивные настройки</h3>
            <button onclick="changeFontSize(2)" style="width:100%; margin-bottom:5px;">Увеличить текст</button>
            <button onclick="changeFontSize(-2)" style="width:100%; background:#b2bec3;">Уменьшить текст</button>
        </div>
    </aside>
</main>

<script>
    // --- ИМИТАЦИЯ ИИ (Здесь подключается API) ---
    async function processAI(type) {
        const text = document.getElementById('mainText').value;
        const loader = document.getElementById('loading');
        
        if (!text) {
            alert("Пожалуйста, введите текст!");
            return;
        }

        loader.style.display = 'block';

        // Имитация задержки обработки
        await new Promise(r => setTimeout(r, 1200));

        if (type === 'rhyme') {
            const rhymes = ["Златого", "Святого", "Живого", "Родного", "Ночного"];
            const container = document.getElementById('rhymeResult');
            container.innerHTML = '';
            rhymes.forEach(word => {
                const el = document.createElement('span');
                el.className = 'tag';
                el.innerText = word;
                el.onclick = () => { document.getElementById('mainText').value += " " + word; };
                container.appendChild(el);
            });
        } else if (type === 'style') {
            document.getElementById('rhythmInfo').innerHTML = 
                `<strong>Совет:</strong> Используйте эпитет "багряный" вместо "красный", чтобы усилить образ заката.`;
        }

        loader.style.display = 'none';
    }

    // --- ФУНКЦИИ ДОСТУПНОСТИ ---
    
    // Озвучка текста (для людей с нарушениями зрения)
    function speakText() {
        const text = document.getElementById('mainText').value;
        if (!text) return;
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'ru-RU';
        window.speechSynthesis.speak(msg);
    }

    // Изменение размера шрифта (для слабовидящих)
    let currentSize = 20;
    function changeFontSize(delta) {
        currentSize += delta;
        document.getElementById('mainText').style.fontSize = currentSize + 'px';
    }

    function clearText() {
        if(confirm("Очистить всё?")) {
            document.getElementById('mainText').value = '';
        }
    }
</script>

</body>
</html>
