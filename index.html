<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Генератор стихов</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff7e00, #ffb347);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.container {
  background: rgba(0, 0, 0, 0.35);
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 600px;
  text-align: center;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 80%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: #ff8c00;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff6a00;
  transform: scale(1.05);
}

.result {
  margin-top: 20px;
  white-space: pre-wrap;
  text-align: left;
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 10px;
  max-height: 300px;
  overflow-y: auto;
}
</style>
</head>

<body>

<div class="container">
  <h2>🟠 Генератор стихов</h2>

  <input type="text" id="topic" placeholder="Например: любовь, город, осень">
  <br>
  <button onclick="generate()">Получить стих</button>

  <div class="result" id="result"></div>
</div>

<script>
const poems = {
  "первая любовь": `Взгляд случайный, дрожь в руках,
Мир застыл на полуслове.
Робкий свет в чужих глазах —
Первый шаг навстречу нови.
Всё вокруг вдруг стало ярче,
Сердце бьётся невпопад.
От улыбки только жарче,
И не хочется назад.
`,
  
  "разбитое сердце": `Осколки клятв звенят внутри,
Пустеет дом, молчит струна.
Ты только память не сотри,
Хоть в ней осталась лишь зима.
И склеить чашу не дано,
Она рассыпалась в руках.
Сюжет дописан, как в кино,
Оставив только горький страх.
`,

  "дружба, проверенная временем": `Сквозь годы, бури и мосты,
Где каждый шаг бывал нелеп,
Со мной всегда стоял лишь ты,
Мой самый верный оберег.
Мы разделяли смех и боль,
И хлеб делили пополам.
Какую б ни играли роль,
Я за тебя всё-всё отдам.
`,

  "одиночество в толпе": `Вокруг смеются голоса,
Мелькают лица в суете,
Но смотрят в пустоту глаза —
Я здесь. Но я совсем нигде.
И сотни пройденных шагов
Не приближают к теплоте.
Среди проспектов и домов
Я растворяюсь в пустоте.
`,

  "мечты и реальность": `Мы строим замки в облаках,
Рисуем звезды на стекле.
А просыпаемся в долгах
И серой пыли на столе.
Но если крылья не сложить
И верить в свой далекий свет,
То можно сказку воплотить,
Встречая радостный рассвет.
`,

  "ночной город": `Неоновый пульсирует поток,
Гудят проспекты, пряча тишину.
Мой город так же, как и я, одинок,
Но он привык не верить никому.
Мерцают фары, словно светлячки,
В бетонных джунглях растворяя грусть.
Мы в этой бездне — только мотыльки,
Но я остаться в ней совсем не трyшусь.
`,

  "детство и воспоминания": `Коленки сбиты, в пальцах — леденец,
И кажется, что лето бесконечно.
Как жаль, что тот спасительный дворец
Из одеял — не сохранился вечно.
Там мама молода, и жив отец,
Там каждый день таит в себе открытия.
И прячется в шкатулке кладенец —
Наивные и светлые события.
`,

  "разговор с самим собой": `В зеркальной глади — строгий суд.
Кто прав, кто виноват — неясно.
Мои сомненья мне же лгут,
Но спорить с ними так напрасно.
Я задаю себе вопрос:
Куда иду и кем я стану?
И этот внутренний допрос
Саднит, как солью по изъяну.
`,

  "осень как состояние души": `Листва ложится под ноги ковром,
И воздух пахнет дымом и печалью.
Мы все однажды этот мир поймем,
Укрывшись теплым пледом, словно шалью.
И дождь стучит по старому стеклу,
Смывая краски пройденного лета.
Я в этой осени покой найду,
Вдали от суеты и яркого света.
`,

  "весна и новое начало": `Растает лед, пробьется первый луч,
И птицы запоют о возвращенье.
Весна всегда имеет тайный ключ
От нашего с тобой сердцебиенья.
Проснутся реки, зацветет сирень,
Стирая память о седых морозах.
И каждый новый, светлый майский день
Утопит горести в счастливых слезах.
`,
    
  "время, которое уходит": `Песок струится сквозь ладонь,
Часы стучат неумолимо.
Не погаси внутри огонь,
Пока твой век проходит мимо.
Минуты тают, как в руках вода,
Их не вернуть ни золотом, ни плачем.
Останутся лишь в памяти года
И то, что мы на самом деле значим.
`,
  "смысл жизни": `Искали в книгах, в золоте, в вине,
В вершинах гор и в глубине морей.
А он таился в ласковой весне
И в смехе подрастающих детей.
Смысл в том, чтоб просто продолжать дышать,
Делиться светом, не прося награды.
И в мелочах всю прелесть познавать,
Снося судьбы любые эстакады.
`,
  "сила слов": `Одно лишь слово может сжечь дотла,
Другое — крылья подарить для взлета.
В словах таится бездна ремесла,
И ранить ими — тоже ведь работа.

Они живут, как искры на ветру,
То согревают, то сжигают кожу.
Я свои фразы бережно беру,
Чтоб не ударить словом, словно дрожью.
`,
  "тишина": `Она звенит, когда уходят все.
Она кричит, когда внутри тревога.
И лишь в рассветной утренней росе
В ней можно слышать тихий голос Бога.
В ней нет ни фальши, ни пустых речей,
Она лечит измученные нервы.
Средь тысяч ярких, городских огней
Я выбираю тишину резервом.
`,
  "потеря близкого человека": `Оборвалась струна, и свет погас.
Лишь тихий шепот в комнате пустой:
«Я буду жить за нас, за нас двоих...
Ты только будь незримо здесь, со мной».
И место за столом теперь болит,
И вещи пахнут тем, кого уж нет.
Но память в сердце о тебе хранит
Твой самый чистый, самый добрый свет.
`,
  "надежда": `Как тонкий луч на самом дне колодца,
Она мерцает, не давая пасть.
И пока сердце в груди нашей бьется,
Тьма не получит над душою власть.
Она ведет сквозь бури и шторма,
Когда порвались старые канаты.
С надеждой не страшна ничья тюрьма,
И мы пред ней навеки виноваты.
`,
  "страх будущего": `Там, за туманом, прячутся пути.
Шагнуть вперед — как прыгнуть со скалы.
Но только так мы сможем обрести
Тот свет, что спрятан в недрах мглы.
Что ждет меня за новым виражом?
Успех, падение иль новая утрата?
Я в это завтра прорубаюсь сквозь
Свои сомненья, как клинком булата.
`,
  "вера в себя": `Когда весь мир твердит тебе: «Сдавайся!»,
Когда закрыты двери на замки,
Ты просто верь. И снова поднимайся,
Иди вперед, прогнозам вопреки.
Твой компас — это внутренний маяк.
Пускай смеются за твоей спиною.
Ты сделаешь один победный шаг,
И станут горы ровною тропою.
`,
  "свобода": `Расправить крылья, сбросить кандалы,
Вдохнуть всей грудью ветер перемен.
Не строить больше стены из золы,
И не просить пощады у колен.
Лететь туда, где небо без границ,
Где нет чужих упреков и приказов.
Быть вольной птицей средь других же птиц,
Не принимая золотых отказов.
`,
  "судьба и выбор": `Направо — лес, налево — океан.
Нам каждый день дается новый путь.
Судьба — не рок, а лишь цветной туман,
Куда шагнем — туда и ляжет суть.
Мы сами пишем главы наших книг,
Вычеркиваем строки и абзацы.
И в самый сложный, переломный миг
Нам остается только не сдаваться.
`,
  "письмо в прошлое": `Себе мальчишке: не спеши, постой!
Не торопись взрослеть, вступая в бой.
Пусть мир пока что кажется простой,
Останься дольше сам самим собой.
Не плачь о том, кто скоро предаст,
Цени моменты, смех и запах лета.
И знай, что жизнь еще тебе воздаст
За все твои искания ответа.
`,
  "письмо в будущее": `Привет из дней, где я пока не знаю,
Кем стану, с кем останусь до седин.
Я просто очень крепко обнимаю
Того, кто доберется до вершин.
Надеюсь, ты простил себе ошибки,
Нашел свой дом и обрел покой.
И сохранились на губах улыбки,
И кто-то верный навсегда с тобой.
`,
  "неосуществлённые мечты": `Пылятся на полках забытые ноты,
Некупленный в Лондон билет у окна.
Мы выбрали офис и в нем же — заботы.
Мечта же осталась, как прежде, одна.
Она иногда по ночам тихо плачет,
Вздыхая о том, что могло бы случиться.
А мы говорим: «Ничего то не значит»,
Боясь за журавликом в небо пуститься.
`,
  "любовь на расстоянии": `Между нами — сотни километров,
Экраны, буквы, холод пикселей.
Но я дышу твоим попутным ветром,
И от того мне с каждым днем теплей.
Мы засыпаем под одним и тем же небом,
Считая дни до рейса на табло.
И я клянусь: где я б сегодня не был,
Мне без тебя темно и тяжело.
`,
  "прощание": `Последний взгляд, неловкий стук дверей.
Сказали все, но главное — смолчали.
Мы стали с этой осени взрослей,
И навсегда друг друга потеряли.
Вокзал глотает слезы и слова,
Поезд уносит вдаль твои надежды.
И кружится в тумане голова,
И мир уже не будет тем, как прежде.`,

"встреча после долгой разлуки": `Знакомый профиль, слезы на глазах,
И кажется, что не было тех лет.
Все страхи рассыпаются во прах,
Когда в твоей руке — мой амулет.
Два сердца бьются в унисон опять,
Сплетая пальцы и стирая мили.
Мы столько долгих зим могли прождать,
Чтоб доказать, как сильно мы любили.`,

"город глазами ребёнка": `Дома — как скалы, лужи — океаны!
Трамваи — это грозные жуки.
В карманах прячут тайные талисманы,
А все заботы — так пока легки.
Асфальт искрится крошками стекла,
А облака похожи на драконов.
Здесь жизнь еще не выжжена дотла
И нет скучных, выдуманных законов.`,

"природа и человек": `Мы рубим лес, чтоб выстроить дома.
Мы травим реки, жаждая прогресса.
Но нас рассудит матушка Зима
И молчаливость вырубленного леса.
Земля вздохнет под тяжестью оков,
Устало смоет наши города.
Природа не прощает дураков,
Она берет свое и навсегда.`,

"море и мысли": `Волна уносит беды в горизонт,
Соленый ветер лечит раны соли.
У моря каждый — свой отдельный фронт,
Где нет ни обязательств, ни контроля.

Смотреть в прибой и слушать чаек крик,
Ракушки гладить, сидя на песке.
И понимать, насколько ты велик
В своем простом, коротком марш-броске.`,

"дождь как символ": `Он смывает тревоги и пыль с мостовых,
Он стучит по стеклу, отмеряя минуты.
В этом сером потоке — молитва святых,
И разорваны старые, ржавые путы.
Капли чертят узоры, прощая грехи,
Освежая сухую, больную планету.
Под мелодию ливня рождаются стихи,
Сквозь него мы приходим к незримому свету.`,

"огонь внутри": `Он жжет мне грудь, толкая на безумства,
Он не дает уснуть, диктуя стих.
И пусть в глазах других я вольнодумец,
Я не предам огней своих святых.
Когда темно и некуда идти,
Мой внутренний костер мне освещает путь.
И я найду все способы дойти,
Никто не сможет пламя задуть.`,

"маски людей": `Улыбка — щит, учтивость — крепкий панцирь.
Мы в этом маскараде с малых лет.
Но кто мы есть в своем нелепом танце,
Когда в театре выключают свет?
Под слоем грима — слезы и морщины,
Под маской силы — загнанная дрожь.
Мы сами строим этих стен плотины,
Выменивая искренность на ложь.`,

"интернет и одиночество": `Тысячи лайков и сотни друзей,
Сообщения сыплются в ленту рекой.
Но ночью в квартире, в тени батарей,
Тебе совершенно не с кем быть собой.
Сеть паутиной опутала души,
Экраны заменили нам глаза.
Но этот мир пластиковый и душный
Не сможет высушить, когда блестит слеза.`,

"жизнь подростка": `Все слишком резко: радость, гнев и боль.
Весь мир противник, правила — тюрьма.
Ты просто ищешь искреннюю роль,
Пока в душе бушует кутерьма.
Родители не слышат, не поймут,
В наушниках грохочет русский рок.
Ты ищешь свой придуманный приют,
Свой тайный и нетронутый порог.`,

"давление общества": `«Так не носи», «учись», «иди работай»,
Мы обрастаем чуждой нам заботой,
Как птицы, запертые в медной клети,
Забыв, какими были мы на свете.
Шаг вправо, влево — тут же осужденье,
Клеймо на лоб за смелые мечты.
И мы идем за общим убежденьем,
Боясь шагнуть за линии черты.`,

"поиск себя": `Кто я такой? Художник иль делец?
Ошибка века или гений мысли?
Я строю свой невидимый дворец
И сам ищу в нем истинные смыслы.
Блуждаю в лабиринтах из идей,
Меняю маски, стили, имена.
Но среди тысяч пройденных путей
Моя дорога все равно одна.`,

"внутренний конфликт": `Во мне живут и ангел, и палач.
Один прощает, а другой карает.
И этот вечный, непрерывный матч
Всю душу без остатка выжигает.
Добро со злом воюют в тишине,
Сдирая кожу с раненой спины.
Я каждый день горю в этом огне,
И нет ни победивших, ни вины.`,

"счастье в мелочах": `Горячий чай в холодный хмурый день,
Мурчащий кот на скомканной постели.
Нам часто замечать такое лень,
А ведь именно в этом — суть апреля.
Запах кофе с утра, теплый свитер в снегу,
Желтый листик, упавший на ворот пальто.
Я все эти осколки в душе берегу,
Ведь без них наша жизнь — превратилась в ничто.`,


  
"ревность": `Зеленый яд по венам, словно ток.
Ты ищешь взгляды, проверяешь фразы.
Любви остался маленький глоток,
Все остальное — липкая проказа.
Она съедает нежность изнутри,
Ломает доверие, сеет раздор.
И гаснут в доме наши фонари,
Оставив лишь обиды да укор.`,

"предательство": `Нож в спину бьет не враг, а лучший друг.
Земля уходит из-под ног мгновенно.
И рвется самый крепкий в мире круг,
Впуская в сердце холод совершенный.
Слова клялись, но руки подвели.
Смотреть в глаза теперь невыносимо.
Остались только горсточки золы,
Где дружба пронеслась, как пуля, мимо.`,

"искренность": `Сказать как есть, не прячась за слова.
Открыть лицо под пристальным прицелом.
Хоть искренность сегодня не права,
Зато душа останется в ней целой.
Не врать себе, не льстить чужим богам,
Быть светом чистым в царстве полутьмы.
Назло любым коварным жерновам
Остаться человеком до зимы.`,

"музыка как спасение": `Надень наушники — и мир исчез.
Аккорды лечат лучше, чем врачи.
Симфония спускается с небес,
И вместе с ней ты снова зазвучишь.
От грустных нот становится светлей,
От ритма барабанов — пульс живей.
И среди всех потерянных людей
Ты с музыкой становишься сильней.`,

"сон и реальность": `Там я летал, там не было преград.
Там был любим и не боялся смерти.
Проснулся. За окном — ночной фасад.
И я опять зажат в пустом конверте.
Грань тонка, где морок, где гранит.
И я не знаю, что из них честнее:
Тот мир, что мое подсознание хранит,
Или реальность, что с утра больнее.`,

"бессонница": `Часы стучат. Три ночи. Половина.
А мысли роем вьются в голове.
Перебираю старую рутину,
Как желтый лист в поникшей трын-траве.
Луна глядит сквозь штору желтым глазом,
В пустой квартире стонет тишина.
И сон не возвращается ни разу,
Когда душа тревогами полна.`,

"уходящее лето": `Последний луч запутался в ветвях,
И птицы собираются на юг.
Остыло солнце на моих губах,
Замкнув тепла короткий, светлый круг.
Август прощается запахом слив,
Воздух становится резче и строже.
Скоро услышим осенний мотив,
Спрятав загар на остынувшей коже.`,

"письмо без ответа": `Отправлен текст, и галочки горят.
Прочитано. Но в мессенджере — пусто.
Глаза в экран бессмысленно глядят,
Встречая это ледяное русло.
И я сотру написанный упрек,
Глотая ком обиды и гордыни.
Я усвоил жестокий твой урок —
Молчание красноречивей ливней.`,

"взросление": `Вчера боялся монстров под кроватью,
Сегодня страшно счет за газ открыть.
Взросление — не праздничное платье,
А навык эту жизнь переварить.
Теперь ты сам себе опора и стена,
И пластырь клеишь на свои же раны.
И пьешь свою ответственность до дна,
Смеясь над тем, как был когда-то пьяным.`,

"молчание вместо слов": `Нам не о чем кричать, мы все сказали.
Молчание звучит страшнее бури.
Мы в этом тихом, опустевшем зале
Вдруг стали словно каменные фурии.
Не нужно фраз, они не лечат боль,
Лишь бередят запекшиеся шрамы.
Мы отыграли нашу с тобой роль
И молча сходим со ступенек драмы.`,

"свет и тьма внутри человека": `Две стороны у каждой из монет.
Я могу предать, а могу спасти.
В нас поровну отмерено: и свет,
И тьма, которой не дано уйти.
Мы дети солнца и питомцы ночи,
Сплетенье самых разных полюсов.
Тот победит, кого ты кормишь больше
На чашах вечных внутренних весов.`,

"мир глазами поэта": `Все — только рифма. Слезы, кровь и смех.
В травинке каждой — целая вселенная.
И пусть мой стих — для многих просто грех,
Зато строка моя — всегда нетленная.
Я вижу суть в обычном пустяке,
Я слышу песню в грохоте металла.
И с тонким черным стержнем в кулаке
Я напишу всё то, что ускользало.`

};

function generate() {
  const input = document.getElementById("topic").value.toLowerCase().trim();

  let found = null;

  for (let key in poems) {
    if (key.includes(input)) {
      found = poems[key];
      break;
    }
  }

  document.getElementById("result").innerText =
    found ? found : "❌ Тема не найдена";
}
</script>
